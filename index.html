<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Debt Crusher</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1" />
<meta name="description" content="Premium personal finance app. Budget, bills, debt payoff, insights — manual-entry first." />
<meta name="theme-color" content="#0E0F11" />
<meta name="color-scheme" content="dark light" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://api.fontshare.com; font-src 'self' https://api.fontshare.com https://cdn.fontshare.com; img-src 'self' blob:; connect-src 'self' https://api.fontshare.com https://cdn.fontshare.com; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self' https://www.perplexity.ai;" />

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Debt Crusher" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
<link rel="icon" href="icons/favicon-16.png" sizes="16x16" />
<link rel="manifest" href="manifest.webmanifest" />

<link rel="stylesheet" href="css/app.css" />
</head>
<body>

<div id="app" class="app" hidden>
  <header class="appbar">
    <div>
      <div class="appbar__sub" id="appbar-sub">Wed · Aug 14</div>
      <h1 class="appbar__title" id="appbar-title">Dashboard</h1>
    </div>
    <div class="appbar__actions">
      <button class="appbar__btn" id="btn-more" aria-label="More screens" title="More">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
      </button>
      <button class="appbar__btn" id="btn-settings" aria-label="Settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.08A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.08A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.08A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c0 .67.36 1.27 1 1.55h.08a2 2 0 1 1 0 4H20a1.7 1.7 0 0 0-1.55 1Z"/></svg>
      </button>
    </div>
  </header>

  <main class="view" id="view"></main>

  <button id="fab" class="fab" aria-label="Add transaction">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <nav class="tabbar" aria-label="Primary">
    <button class="tabbar__btn" data-route="dashboard" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
      <span class="tabbar__dot"></span>Home
    </button>
    <button class="tabbar__btn" data-route="transactions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h10M4 17h16"/></svg>
      <span class="tabbar__dot"></span>Activity
    </button>
    <button class="tabbar__btn" data-route="budget">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V5M4 19h16"/><path d="M8 15v4M12 11v8M16 7v12"/></svg>
      <span class="tabbar__dot"></span>Budget
    </button>
    <button class="tabbar__btn" data-route="debt">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18v12H3z"/><path d="M3 10h18"/><path d="M7 15h3"/></svg>
      <span class="tabbar__dot"></span>Debt
    </button>
    <button class="tabbar__btn" data-route="bills">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>
      <span class="tabbar__dot"></span>Bills
    </button>
  </nav>

  <div id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer__sheet">
      <div class="drawer__grab" aria-hidden="true"></div>
      <div class="drawer__title">More</div>
      <div class="drawer__list">
        <button class="drawer__item" data-route="simulator">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 18 10 12 14 16 20 8"/><path d="M14 8h6v6"/></svg>
          Payoff Simulator
        </button>
        <button class="drawer__item" data-route="insights">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v18M3 12h18"/><circle cx="12" cy="12" r="9"/></svg>
          Insights
        </button>
        <button class="drawer__item" data-route="goals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1"/></svg>
          Goals
        </button>
        <button class="drawer__item" data-route="credit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/><path d="M7 15h3"/></svg>
          Credit Health
        </button>
        <button class="drawer__item" data-route="review">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3 8-8"/><path d="M21 12a9 9 0 1 1-9-9"/></svg>
          Weekly Review
        </button>
        <button class="drawer__item" data-route="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/></svg>
          Settings &amp; Install
        </button>
      </div>
    </div>
  </div>

  <div id="sheet" class="sheet" aria-hidden="true"><div class="sheet__inner" id="sheet-inner"></div></div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</div>

<!-- Onboarding container appears here when no profile exists -->
<div id="onboarding-root"></div>

<script src="js/storage.js" defer></script>
<script src="js/data.js" defer></script>
<script src="js/calc.js" defer></script>
<script src="js/charts.js" defer></script>
<script src="js/screens.js" defer></script>
<script src="js/app.js" defer></script>
</body>
</html>
